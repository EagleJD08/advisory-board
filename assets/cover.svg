<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" preserveAspectRatio="xMidYMid meet" width="560" height="400">
  <rect width="560" height="400" fill="#FAFAF7"/>

  <!-- Orbit ellipse -->
  <ellipse cx="280" cy="200" rx="200" ry="120" fill="none" stroke="#0A0A0A" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Radial connectors: 5 ship (cocoa), 1 wait (slate-navy dashed) -->
  <line x1="92.06" y1="158.96" x2="280" y2="200" stroke="#6B4226" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="205.08" y1="88.74" x2="280" y2="200" stroke="#6B4226" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="367.67" y1="92.14" x2="280" y2="200" stroke="#6B4226" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="472.25" y1="166.92" x2="280" y2="200" stroke="#6B4226" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="449.61" y1="263.59" x2="280" y2="200" stroke="#6B4226" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="192.33" y1="307.85" x2="280" y2="200" stroke="#2C4A6E" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="3 4"/>

  <!-- Center verdict mark -->
  <rect x="266" y="186" width="28" height="28" fill="none" stroke="#6B4226" stroke-opacity="0.25" stroke-width="1"/>
  <rect x="273" y="193" width="14" height="14" fill="#6B4226" rx="1"/>

  <!-- Advisor nodes (5 ship + 1 wait) with labels -->
  <g font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="1.2" fill="#0A0A0A" fill-opacity="0.75" text-anchor="middle" style="text-transform: uppercase;">
    <circle cx="92.06" cy="158.96" r="8" fill="#6B4226"/>
    <text x="92.06" y="184.96">COS</text>

    <circle cx="205.08" cy="88.74" r="8" fill="#6B4226"/>
    <text x="205.08" y="114.74">PM</text>

    <circle cx="367.67" cy="92.14" r="8" fill="#6B4226"/>
    <text x="367.67" y="118.14">CTO</text>

    <circle cx="472.25" cy="166.92" r="8" fill="#6B4226"/>
    <text x="472.25" y="192.92">CMO</text>

    <circle cx="449.61" cy="263.59" r="8" fill="#6B4226"/>
    <text x="449.61" y="289.59">CPO</text>

    <circle cx="192.33" cy="307.85" r="8" fill="#FAFAF7" stroke="#2C4A6E" stroke-width="1.25"/>
    <text x="192.33" y="333.85">CHALLENGER</text>
  </g>

  <!-- Overline -->
  <g font-family="'Inter', system-ui, sans-serif" font-size="9" font-weight="700" letter-spacing="1.44">
    <rect x="22" y="16.5" width="5" height="5" fill="#6B4226" rx="1"/>
    <text x="34" y="22" fill="#0A0A0A" fill-opacity="0.55" style="text-transform: uppercase;">ADVISORY BOARD</text>
  </g>
</svg>
